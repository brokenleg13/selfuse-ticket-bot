<fieldset>
    <legend>演出配置</legend>
    <div class="form-row">
        <label for="concert-name">演出名称</label>
        <input type="text" id="concert-name" name="concert-name" placeholder="请输入演出名称">
    </div>
    <div class="form-row">
        <label for="concert-id">演出 ID / 链接</label>
        <input type="text" id="concert-id" name="concert-id" placeholder="请输入演出 ID 或链接">
    </div>
    <div class="form-row">
        <label for="feishu-bot-id">飞书机器人 Webhook</label>
        <input type="text" id="feishu-bot-id" name="feishu-bot-id" placeholder="请输入飞书机器人 Webhook">
    </div>
    <div class="form-row">
        <label for="nb-ticket">购票数量</label>
        <select name="ticket" id="ticket">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>
    </div>
    <div class="form-row-half">
        <div class="form-col">
            <input type="date" id="date" name="date">
        </div>
        <div class="form-col">
            <input type="time" id="time" name="time">
        </div>
    </div>
    <div class="form-row">
        <label for="section">优先区域</label>
        <input type="text" id="section" name="section" placeholder="请输入区域，逗号分隔，如 004,005">
    </div>
</fieldset>
