<fieldset>
    <legend>Concert Settings</legend>
    <div class="form-row">
        <label for="concert-name">Concert Name</label>
        <input type="text" id="concert-name" name="concert-name" placeholder="Enter concert name">
    </div>
    <div class="form-row">
        <label for="concert-id">Concert ID / Link</label>
        <input type="text" id="concert-id" name="concert-id" placeholder="Enter concert ID or link">
    </div>
    <div class="form-row">
        <label for="feishu-bot-id">Feishu Bot Webhook</label>
        <input type="text" id="feishu-bot-id" name="feishu-bot-id" placeholder="Enter Feishu bot webhook">
    </div>
    <div class="form-row">
        <label for="nb-ticket">Number of Tickets</label>
        <select name="ticket" id="ticket">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>
    </div>
    <div class="form-row-half">
        <div class="form-col">
            <input type="date" id="date" name="date">
        </div>
        <div class="form-col">
            <input type="time" id="time" name="time">
        </div>
    </div>
    <div class="form-row">
        <label for="section">Preferred Section</label>
        <input type="text" id="section" name="section" placeholder="Enter sections, comma-separated, e.g. 004,005">
    </div>
</fieldset>
